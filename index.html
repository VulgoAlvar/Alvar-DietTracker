<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>DietTracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍎</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--transition:.18s ease;}
[data-theme="dark"]{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#161616;
  --surface:#1a1a1a;--surface2:#202020;--surface3:#2a2a2a;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);
  --text:#f0f0f0;--text2:#888888;--text3:#505050;
  --shadow:0 4px 24px rgba(0,0,0,.6);--shadow-sm:0 2px 8px rgba(0,0,0,.4);
  --sidebar-bg:#111111;--header-bg:#111111;--card-bg:#1a1a1a;--input-bg:#111111;--overlay-bg:rgba(0,0,0,.8);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8eaf2;--bg3:#dde0ee;
  --surface:#ffffff;--surface2:#f5f6fc;--surface3:#eceef8;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);
  --text:#111827;--text2:#4b5577;--text3:#9aa0c0;
  --shadow:0 4px 24px rgba(0,0,0,.10);--shadow-sm:0 2px 8px rgba(0,0,0,.07);
  --sidebar-bg:#ffffff;--header-bg:#ffffff;--card-bg:#ffffff;--input-bg:#f0f2f8;--overlay-bg:rgba(0,0,0,.55);
}
:root{
  --green:#3ddc84;--green2:#2bc56e;--green-dim:rgba(61,220,132,.14);--green-glow:rgba(61,220,132,.25);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,.13);
  --orange:#f59e42;--orange-dim:rgba(245,158,66,.13);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,.13);
  --red:#f87171;--red-dim:rgba(248,113,113,.13);
  --teal:#2dd4bf;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition);}
h1,h2,h3,.logo-text,.page-title,.cal-num,.water-big,.macro-val,.metric-val{font-family:'Syne',sans-serif;}
input,select,button,textarea{font-family:'Plus Jakarta Sans',sans-serif;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.app-wrap{display:flex;min-height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);display:none;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;transition:background var(--transition);z-index:50;}
@media(min-width:768px){.sidebar{display:flex;}}
.sidebar-logo{padding:22px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green),#1ea85c);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px var(--green-glow);}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.logo-text span{color:var(--green);}
.nav-section{padding:0 10px;margin-bottom:4px;}
.nav-section-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;padding:4px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:500;position:relative;margin-bottom:2px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--green-dim);color:var(--green);font-weight:600;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--green);border-radius:0 3px 3px 0;}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.8;}
.nav-item.active .nav-icon,.nav-item:hover .nav-icon{opacity:1;}
.sidebar-bottom{margin-top:auto;padding:14px 10px;border-top:1px solid var(--border);}
.user-pill{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s;}
.user-pill:hover{background:var(--surface2);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--green),#1ea85c);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#051a0c;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10px;color:var(--text3);}
.page-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden;}
.topbar{background:var(--header-bg);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;transition:background var(--transition);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.mobile-menu-btn{display:flex;background:var(--surface2);border:none;cursor:pointer;width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;color:var(--text2);}
@media(min-width:768px){.mobile-menu-btn{display:none;}}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.theme-toggle{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;font-size:16px;}
.theme-toggle:hover{background:var(--surface3);color:var(--text);}
.mobile-user{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:4px 10px 4px 4px;cursor:pointer;}
@media(min-width:768px){.mobile-user{display:none;}}
.main{flex:1;padding:20px 16px 90px;overflow-y:auto;}
@media(min-width:768px){.main{padding:24px 28px 40px;}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--header-bg);border-top:1px solid var(--border);display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom);transition:background var(--transition);}
@media(min-width:768px){.bottom-nav{display:none;}}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;color:var(--text3);transition:color .15s;font-size:9px;font-weight:600;}
.bnav-item.active{color:var(--green);}
.bnav-item svg{width:20px;height:20px;}
.phead{margin-bottom:20px;}
.phead-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:2px;}
.phead-sub{font-size:12px;color:var(--text2);}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
@media(min-width:600px){.metric-grid{grid-template-columns:repeat(4,1fr);}}
.metric-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:background var(--transition);position:relative;overflow:hidden;}
.metric-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.metric-card.green::after{background:linear-gradient(90deg,var(--green),var(--teal));}
.metric-card.blue::after{background:linear-gradient(90deg,var(--blue),#818cf8);}
.metric-card.orange::after{background:linear-gradient(90deg,var(--orange),#f6b93b);}
.metric-card.purple::after{background:linear-gradient(90deg,var(--purple),#ec4899);}
.metric-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.metric-icon.green{background:var(--green-dim);}
.metric-icon.blue{background:var(--blue-dim);}
.metric-icon.orange{background:var(--orange-dim);}
.metric-icon.purple{background:var(--purple-dim);}
.metric-icon svg{width:18px;height:18px;}
.metric-val{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.metric-label{font-size:11px;color:var(--text2);font-weight:500;}
.metric-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.date-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;scrollbar-width:none;}
.date-strip::-webkit-scrollbar{display:none;}
.date-chip{flex-shrink:0;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;text-align:center;transition:all .15s;min-width:50px;}
.date-chip:hover{border-color:var(--border2);}
.date-chip.active{background:var(--green-dim);border-color:rgba(61,220,132,.4);}
.date-chip .dn{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;color:var(--text);}
.date-chip.active .dn{color:var(--green);}
.date-chip .dw{font-size:9px;color:var(--text2);margin-top:1px;text-transform:capitalize;}
.date-chip .dot{width:4px;height:4px;border-radius:50%;margin:2px auto 0;}
.cal-hero{background:var(--card-bg);border:1px solid var(--border2);border-radius:16px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;transition:background var(--transition);}
.cal-ring-wrap{position:relative;flex-shrink:0;}
.cal-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.cal-num{font-size:20px;font-weight:700;}
.cal-unit{font-size:9px;color:var(--text2);}
.cal-info{flex:1;min-width:0;}
.cal-goal{font-size:11px;color:var(--text2);margin-bottom:2px;}
.cal-remain{font-size:28px;font-weight:700;letter-spacing:-.5px;color:var(--green);font-family:'Syne',sans-serif;}
.cal-remain-label{font-size:11px;color:var(--text2);}
.cal-meals-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-dim);border-radius:999px;padding:3px 9px;font-size:10px;font-weight:600;color:var(--green);margin-top:8px;}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.macro-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;position:relative;overflow:hidden;transition:background var(--transition);}
.macro-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.macro-card.prot::before{background:var(--blue);}
.macro-card.carb::before{background:var(--orange);}
.macro-card.fat::before{background:var(--purple);}
.macro-val{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.macro-label{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500;}
.macro-remain{font-size:9px;color:var(--text3);margin-top:3px;}
.prog-section{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;transition:background var(--transition);}
.prog-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;}
.prog-row{margin-bottom:12px;}
.prog-row:last-child{margin-bottom:0;}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prog-name{font-size:12px;font-weight:600;}
.prog-vals{font-size:10px;color:var(--text2);}
.prog-track{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;transition:background var(--transition);}
.card-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;}
.meal-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,background var(--transition);}
.meal-card.done{border-color:rgba(61,220,132,.3);}
.meal-hdr{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;user-select:none;}
.meal-hdr:hover{background:rgba(255,255,255,.02);}
[data-theme="light"] .meal-hdr:hover{background:rgba(0,0,0,.02);}
.meal-title-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.meal-check{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;}
.meal-check.done{background:var(--green);border-color:var(--green);color:#051a0c;font-weight:700;}
.meal-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meal-time-badge{font-size:10px;color:var(--text3);flex-shrink:0;}
.meal-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.meal-kcal{font-size:13px;font-weight:700;color:var(--green);font-family:'Syne',sans-serif;}
.status-pill{font-size:9px;padding:3px 8px;border-radius:999px;font-weight:700;flex-shrink:0;}
.pill-done{background:var(--green-dim);color:var(--green);}
.pill-pend{background:var(--surface3);color:var(--text2);}
.chevron{font-size:13px;color:var(--text3);transition:transform .2s;line-height:1;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.meal-body{border-top:1px solid var(--border);padding:12px 15px;}
.food-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px;}
.food-row:last-child{border-bottom:none;}
.food-name-cell{flex:1;min-width:0;}
.food-nm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.food-qty-label{font-size:10px;color:var(--text3);}
.food-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.food-kcal{font-size:11px;color:var(--text2);}
.meal-actions{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}
.water-hero{background:var(--card-bg);border:1px solid rgba(91,156,246,.25);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;transition:background var(--transition);}
.water-big{font-size:46px;font-weight:700;letter-spacing:-.5px;color:var(--blue);}
.water-wave{position:relative;height:66px;background:var(--surface2);border-radius:12px;overflow:hidden;margin:14px 0;}
.water-fill-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(91,156,246,.55),rgba(91,156,246,.22));transition:height .6s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;}
.water-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.water-btn{background:var(--blue-dim);border:1px solid rgba(91,156,246,.2);color:var(--blue);border-radius:9px;padding:8px 13px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.water-btn:hover{background:rgba(91,156,246,.22);}
.water-log-item{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--surface2);border-radius:9px;font-size:12px;margin-bottom:5px;}
.btn{border:none;border-radius:9px;cursor:pointer;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:8px 13px;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-sm{padding:5px 9px;font-size:11px;border-radius:7px;}
.btn-xs{padding:3px 7px;font-size:10px;border-radius:6px;}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,220,132,.2);}
.btn-green:hover{background:rgba(61,220,132,.22);}
.btn-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,156,246,.2);}
.btn-blue:hover{background:rgba(91,156,246,.22);}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.btn-red:hover{background:rgba(248,113,113,.22);}
.btn-orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(245,158,66,.2);}
.btn-orange:hover{background:rgba(245,158,66,.22);}
.btn-primary{background:var(--green);color:#051a0c;border:none;font-weight:700;box-shadow:0 0 16px var(--green-glow);}
.btn-primary:hover{background:var(--green2);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn-outline:hover{background:var(--surface2);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
@media(min-width:600px){.overlay{align-items:center;}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease;transition:background var(--transition);}
@media(min-width:600px){.modal{border-radius:20px;}}
@keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.close-btn{background:var(--surface2);border:none;color:var(--text2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.close-btn:hover{background:var(--surface3);color:var(--text);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--input-bg);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s,background var(--transition);}
.field input:focus,.field select:focus{border-color:var(--green);}
.field input::placeholder{color:var(--text3);}
.field select option{background:var(--bg2);}
.field-row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.cat-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px;}
.cat-pill{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .15s;}
.cat-pill.active{background:var(--green);color:#051a0c;border-color:var(--green);}
.food-list{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.food-opt{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--surface2);border:1px solid transparent;border-radius:9px;cursor:pointer;transition:all .15s;gap:8px;}
.food-opt:hover{border-color:var(--border2);}
.food-opt.sel{border-color:var(--green);background:rgba(61,220,132,.06);}
.food-opt-name{font-size:12px;font-weight:500;}
.food-opt-cat{font-size:10px;color:var(--text3);}
.food-opt-macro{font-size:10px;color:var(--text2);text-align:right;flex-shrink:0;}
.food-opt-macro strong{color:var(--green);font-size:11px;}
.food-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.food-preview-name{font-size:12px;font-weight:700;margin-bottom:6px;}
.food-preview-macros{display:flex;gap:10px;font-size:11px;color:var(--text2);flex-wrap:wrap;}
.macro-badge{display:inline-flex;align-items:center;gap:3px;background:var(--surface3);padding:2px 7px;border-radius:999px;}
.macro-badge .dot{width:6px;height:6px;border-radius:50%;}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:var(--bg);transition:background var(--transition);}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:var(--shadow);transition:background var(--transition);}
.login-logo-wrap{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:4px;}
.login-logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--green),#1ea85c);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--green-glow);}
.login-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.3px;}
.login-logo-text span{color:var(--green);}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:26px;}
.err-msg{background:var(--red-dim);border:1px solid rgba(248,113,113,.25);color:var(--red);border-radius:9px;padding:8px 12px;font-size:12px;margin-bottom:11px;}
.ok-msg{background:var(--green-dim);border:1px solid rgba(61,220,132,.25);color:var(--green);border-radius:9px;padding:8px 12px;font-size:12px;margin-bottom:11px;}

.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.admin-row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;transition:background var(--transition);}
.toast{position:fixed;top:16px;right:16px;background:var(--surface3);border:1px solid var(--border2);border-radius:11px;padding:10px 15px;font-size:12px;font-weight:600;z-index:500;animation:fadeIn .2s ease;max-width:240px;pointer-events:none;backdrop-filter:blur(8px);}
.toast.success{border-color:rgba(61,220,132,.4);color:var(--green);}
.toast.error{border-color:rgba(248,113,113,.4);color:var(--red);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:9px;}
.empty-state{text-align:center;padding:44px 18px;color:var(--text2);}
.custom-row{display:flex;gap:7px;margin-top:9px;}
.custom-row input{flex:1;background:var(--input-bg);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s,background var(--transition);}
.custom-row input:focus{border-color:var(--blue);}
.inline-edit{background:var(--input-bg);border:1px solid var(--green);color:var(--text);border-radius:6px;padding:3px 7px;font-size:13px;font-weight:600;outline:none;width:100%;max-width:180px;font-family:'Plus Jakarta Sans',sans-serif;}
.goals-chart-row{display:flex;align-items:center;gap:14px;}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:16px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.theme-hint{font-size:10px;color:var(--text3);margin-top:6px;text-align:center;}

/* ── DB API ── */
const DB={
  // USERS
  getUsers:async()=>{
    const r=await supa('users?select=*&order=created_at');
    return r||[];
  },
  getUserByUsername:async(username)=>{
    const r=await supa('users?username=eq.'+username+'&select=*');
    return r&&r[0]?r[0]:null;
  },
  createUser:async(username,password,name)=>{
    return await supa('users',{method:'POST',body:JSON.stringify({username,password,name,status:'pending',is_admin:false})});
  },
  updateUserStatus:async(username,status)=>{
    return await supa('users?username=eq.'+username,{method:'PATCH',body:JSON.stringify({status})});
  },
  deleteUser:async(username)=>{
    return await supa('users?username=eq.'+username,{method:'DELETE'});
  },
  // DAY DATA
  getDayData:async(username,date)=>{
    const r=await supa('day_data?username=eq.'+username+'&date=eq.'+date+'&select=*');
    return r&&r[0]?r[0]:null;
  },
  upsertDayData:async(username,date,data)=>{
    return await supa('day_data',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({username,date,...data}),
    });
  },
  // SETTINGS
  getSettings:async(username)=>{
    const r=await supa('user_settings?username=eq.'+username+'&select=*');
    return r&&r[0]?r[0]:null;
  },
  upsertSettings:async(username,data)=>{
    return await supa('user_settings',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({username,...data}),
    });
  },
};

const calcDone=(meals,done)=>{
  let cal=0,prot=0,carb=0,fat=0;
  meals.filter(m=>done.includes(m.id)).forEach(m=>m.foods.forEach(f=>{cal+=f.cal;prot+=f.prot;carb+=f.carb;fat+=f.fat;}));
  return{cal:Math.round(cal),prot:Math.round(prot*10)/10,carb:Math.round(carb*10)/10,fat:Math.round(fat*10)/10};
};

/* ── useDay hook: loads/saves day data from Supabase ── */
function useDay(username,date,template){
  const [meals,setMeals]=useState([]);
  const [done,setDone]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    let cancelled=false;
    setLoading(true);
    DB.getDayData(username,date).then(row=>{
      if(cancelled)return;
      if(row){
        setMeals(row.meals||[]);
        setDone(row.done_meals||[]);
      } else {
        const m=(template||DEFAULT_TEMPLATES).map(t=>({...t,id:uid(),foods:t.foods.map(f=>({...f}))}));
        setMeals(m);
        setDone([]);
        DB.upsertDayData(username,date,{meals:m,done_meals:[],water:{total:0,log:[]}}).catch(()=>{});
      }
      setLoading(false);
    }).catch(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[username,date]);

  const saveMeals=async(m)=>{setMeals(m);await DB.upsertDayData(username,date,{meals:m});};
  const saveDone=async(d)=>{setDone(d);await DB.upsertDayData(username,date,{done_meals:d});};

  return{meals,done,loading,saveMeals,saveDone};
}

/* ── useWater hook ── */
function useWater(username,date){
  const [water,setWater]=useState({total:0,log:[]});
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    let cancelled=false;
    DB.getDayData(username,date).then(row=>{
      if(cancelled)return;
      setWater(row&&row.water?row.water:{total:0,log:[]});
      setLoading(false);
    }).catch(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[username,date]);
  const saveWater=async(w)=>{setWater(w);await DB.upsertDayData(username,date,{water:w});};
  return{water,loading,saveWater};
}

/* ── useSettings hook ── */
function useSettings(username){
  const [goals,setGoals]=useState({cal:2000,prot:150,carb:220,fat:65});
  const [waterGoal,setWaterGoal]=useState(2500);
  const [template,setTemplate]=useState(DEFAULT_TEMPLATES);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    DB.getSettings(username).then(row=>{
      if(row){
        if(row.goals)setGoals(row.goals);
        if(row.water_goal)setWaterGoal(row.water_goal);
        if(row.template&&row.template.length>0)setTemplate(row.template);
      }
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[username]);
  const save=async(g,wg)=>{
    setGoals(g);setWaterGoal(wg);
    await DB.upsertSettings(username,{goals:g,water_goal:wg});
  };
  const saveTemplate=async(t)=>{
    setTemplate(t);
    await DB.upsertSettings(username,{template:t});
  };
  return{goals,waterGoal,template,loading,save,saveTemplate};
}
