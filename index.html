<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>DietTracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127822;</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--tr:.18s ease;}
[data-theme="dark"]{
  --bg:#0a0a0a;--bg2:#111;--surface:#1a1a1a;--surface2:#202020;--surface3:#2a2a2a;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);
  --text:#f0f0f0;--text2:#888;--text3:#505050;
  --card:#1a1a1a;--input:#111;--overlay:rgba(0,0,0,.8);
  --shadow:0 4px 24px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8eaf2;--surface:#fff;--surface2:#f5f6fc;--surface3:#eceef8;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);
  --text:#111827;--text2:#4b5577;--text3:#9aa0c0;
  --card:#fff;--input:#f0f2f8;--overlay:rgba(0,0,0,.55);
  --shadow:0 4px 24px rgba(0,0,0,.10);
}
:root{
  --gr:#3ddc84;--gr2:#2bc56e;--gd:rgba(61,220,132,.14);--gg:rgba(61,220,132,.25);
  --bl:#5b9cf6;--bd:rgba(91,156,246,.13);
  --or:#f59e42;--od:rgba(245,158,66,.13);
  --pu:#a78bfa;--pd:rgba(167,139,250,.13);
  --re:#f87171;--rd:rgba(248,113,113,.13);
  --te:#2dd4bf;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--tr),color var(--tr);}
h1,h2,h3,.logo-text,.ph-title,.cal-num,.wbig,.mv{font-family:'Syne',sans-serif;}
input,select,button,textarea{font-family:'Plus Jakarta Sans',sans-serif;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.app{display:flex;min-height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:none;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:50;transition:background var(--tr);}
@media(min-width:768px){.sidebar{display:flex;}}
.sl{padding:22px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.li{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--gr),#1ea85c);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px var(--gg);}
.logo-text{font-size:17px;font-weight:700;}.logo-text span{color:var(--gr);}
.ns{padding:0 10px;margin-bottom:4px;}
.nsl{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;padding:4px 10px 6px;}
.ni{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:500;position:relative;margin-bottom:2px;}
.ni:hover{background:var(--surface2);color:var(--text);}
.ni.active{background:var(--gd);color:var(--gr);font-weight:600;}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gr);border-radius:0 3px 3px 0;}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.8;}.ni.active .nav-icon,.ni:hover .nav-icon{opacity:1;}
.sb{margin-top:auto;padding:14px 10px;border-top:1px solid var(--border);}
.up{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s;}
.up:hover{background:var(--surface2);}
.ua{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gr),#1ea85c);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#051a0c;flex-shrink:0;}
.ui{flex:1;min-width:0;}.un{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.ur{font-size:10px;color:var(--text3);}
.pw{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden;}
.tb{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;transition:background var(--tr);}
.tbl{display:flex;align-items:center;gap:12px;}
.mmb{display:flex;background:var(--surface2);border:none;cursor:pointer;width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;color:var(--text2);}
@media(min-width:768px){.mmb{display:none;}}
.tbt{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.tbr{display:flex;align-items:center;gap:8px;}
.tt{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;}
.tt:hover{background:var(--surface3);color:var(--text);}
.mu{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:4px 10px 4px 4px;cursor:pointer;}
@media(min-width:768px){.mu{display:none;}}
.main{flex:1;padding:20px 16px 90px;overflow-y:auto;}
@media(min-width:768px){.main{padding:24px 28px 40px;}}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom);transition:background var(--tr);}
@media(min-width:768px){.bn{display:none;}}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;color:var(--text3);transition:color .15s;font-size:9px;font-weight:600;}
.bi.active{color:var(--gr);}.bi svg{width:20px;height:20px;}
.ph{margin-bottom:20px;}.ph-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:2px;}.ph-sub{font-size:12px;color:var(--text2);}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
@media(min-width:600px){.mg{grid-template-columns:repeat(4,1fr);}}
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:background var(--tr);position:relative;overflow:hidden;}
.mc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.mc.cg::after{background:linear-gradient(90deg,var(--gr),var(--te));}.mc.cb::after{background:linear-gradient(90deg,var(--bl),#818cf8);}
.mc.co::after{background:linear-gradient(90deg,var(--or),#f6b93b);}.mc.cp::after{background:linear-gradient(90deg,var(--pu),#ec4899);}
.mci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mci.g{background:var(--gd);}.mci.b{background:var(--bd);}.mci.o{background:var(--od);}.mci.p{background:var(--pd);}
.mci svg{width:18px;height:18px;}
.mv{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1;}.ml{font-size:11px;color:var(--text2);font-weight:500;}.ms{font-size:10px;color:var(--text3);margin-top:1px;}
.ds{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;scrollbar-width:none;}
.ds::-webkit-scrollbar{display:none;}
.dc{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;text-align:center;transition:all .15s;min-width:50px;}
.dc:hover{border-color:var(--border2);}.dc.active{background:var(--gd);border-color:rgba(61,220,132,.4);}
.dc .dn{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;color:var(--text);}.dc.active .dn{color:var(--gr);}
.dc .dw{font-size:9px;color:var(--text2);margin-top:1px;text-transform:capitalize;}
.dc .dot{width:4px;height:4px;border-radius:50%;margin:2px auto 0;}
.ch{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;transition:background var(--tr);}
.cc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.cal-num{font-size:20px;font-weight:700;}.cu{font-size:9px;color:var(--text2);}
.cr{font-size:28px;font-weight:700;letter-spacing:-.5px;color:var(--gr);font-family:'Syne',sans-serif;}
.cmb{display:inline-flex;align-items:center;gap:5px;background:var(--gd);border-radius:999px;padding:3px 9px;font-size:10px;font-weight:600;color:var(--gr);margin-top:8px;}
.mr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.mrc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;position:relative;overflow:hidden;transition:background var(--tr);}
.mrc::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.mrc.pr::before{background:var(--bl);}.mrc.ca::before{background:var(--or);}.mrc.fa::before{background:var(--pu);}
.macro-val{font-size:20px;font-weight:700;letter-spacing:-.3px;}.macro-label{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500;}.macro-remain{font-size:9px;color:var(--text3);margin-top:3px;}
.ps{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;transition:background var(--tr);}
.pst{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;}
.pr2{margin-bottom:12px;}.pr2:last-child{margin-bottom:0;}
.prh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prn{font-size:12px;font-weight:600;}.prv{font-size:10px;color:var(--text2);}
.prt{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.prf{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;transition:background var(--tr);}
.card-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,background var(--tr);}
.mcard.done{border-color:rgba(61,220,132,.3);}
.mh{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;user-select:none;}
.mh:hover{background:rgba(255,255,255,.02);}
[data-theme="light"] .mh:hover{background:rgba(0,0,0,.02);}
.mtr{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.mck{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;}
.mck.done{background:var(--gr);border-color:var(--gr);color:#051a0c;font-weight:700;}
.mtit{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mtb{font-size:10px;color:var(--text3);flex-shrink:0;}
.mr2{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.mkcal{font-size:13px;font-weight:700;color:var(--gr);font-family:'Syne',sans-serif;}
.spill{font-size:9px;padding:3px 8px;border-radius:999px;font-weight:700;flex-shrink:0;}
.spdone{background:var(--gd);color:var(--gr);}.sppend{background:var(--surface3);color:var(--text2);}
.chev{font-size:13px;color:var(--text3);transition:transform .2s;line-height:1;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.mb{border-top:1px solid var(--border);padding:12px 15px;}
.fr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px;}
.fr:last-child{border-bottom:none;}
.fnc{flex:1;min-width:0;}.fnm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.fql{font-size:10px;color:var(--text3);}
.frt{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.mal{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}
.wh{background:var(--card);border:1px solid rgba(91,156,246,.25);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;transition:background var(--tr);}
.wbig{font-size:46px;font-weight:700;letter-spacing:-.5px;color:var(--bl);}
.wwave{position:relative;height:66px;background:var(--surface2);border-radius:12px;overflow:hidden;margin:14px 0;}
.wfill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(91,156,246,.55),rgba(91,156,246,.22));transition:height .6s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;}
.wbtns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.wbtn{background:var(--bd);border:1px solid rgba(91,156,246,.2);color:var(--bl);border-radius:9px;padding:8px 13px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.wbtn:hover{background:rgba(91,156,246,.22);}
.wli{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--surface2);border-radius:9px;font-size:12px;margin-bottom:5px;}
.btn{border:none;border-radius:9px;cursor:pointer;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:8px 13px;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-sm{padding:5px 9px;font-size:11px;border-radius:7px;}.btn-xs{padding:3px 7px;font-size:10px;border-radius:6px;}
.bg{background:var(--gd);color:var(--gr);border:1px solid rgba(61,220,132,.2);}.bg:hover{background:rgba(61,220,132,.22);}
.bb{background:var(--bd);color:var(--bl);border:1px solid rgba(91,156,246,.2);}.bb:hover{background:rgba(91,156,246,.22);}
.br{background:var(--rd);color:var(--re);border:1px solid rgba(248,113,113,.2);}.br:hover{background:rgba(248,113,113,.22);}
.bo{background:var(--od);color:var(--or);border:1px solid rgba(245,158,66,.2);}.bo:hover{background:rgba(245,158,66,.22);}
.bp{background:var(--gr);color:#051a0c;border:none;font-weight:700;box-shadow:0 0 16px var(--gg);}.bp:hover{background:var(--gr2);transform:translateY(-1px);}
.bou{background:transparent;border:1px solid var(--border2);color:var(--text);}.bou:hover{background:var(--surface2);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;}
.ov{position:fixed;inset:0;background:var(--overlay);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
@media(min-width:600px){.ov{align-items:center;}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;animation:su .22s ease;transition:background var(--tr);}
@media(min-width:600px){.modal{border-radius:20px;}}
@keyframes su{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mt{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.xb{background:var(--surface2);border:none;color:var(--text2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.xb:hover{background:var(--surface3);color:var(--text);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--input);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s,background var(--tr);}
.field input:focus,.field select:focus{border-color:var(--gr);}
.field input::placeholder{color:var(--text3);}
.field select option{background:var(--bg2);}
.cp2{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px;}
.cp{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .15s;}
.cp.active{background:var(--gr);color:#051a0c;border-color:var(--gr);}
.fl{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fo{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--surface2);border:1px solid transparent;border-radius:9px;cursor:pointer;transition:all .15s;gap:8px;}
.fo:hover{border-color:var(--border2);}.fo.sel{border-color:var(--gr);background:rgba(61,220,132,.06);}
.fon{font-size:12px;font-weight:500;}.foc{font-size:10px;color:var(--text3);}
.fom{font-size:10px;color:var(--text2);text-align:right;flex-shrink:0;}.fom strong{color:var(--gr);font-size:11px;}
.fp{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.fpn{font-size:12px;font-weight:700;margin-bottom:6px;}
.fpm{display:flex;gap:10px;font-size:11px;color:var(--text2);flex-wrap:wrap;}
.mb2{display:inline-flex;align-items:center;gap:3px;background:var(--surface3);padding:2px 7px;border-radius:999px;}
.mb2 .dot{width:6px;height:6px;border-radius:50%;}
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:var(--bg);transition:background var(--tr);}
.lc{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:var(--shadow);transition:background var(--tr);}
.llw{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:4px;}
.lli{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--gr),#1ea85c);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--gg);}
.llt{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.3px;}.llt span{color:var(--gr);}
.ls{font-size:12px;color:var(--text2);text-align:center;margin-bottom:26px;}
.em{background:var(--rd);border:1px solid rgba(248,113,113,.25);color:var(--re);border-radius:9px;padding:8px 12px;font-size:12px;margin-bottom:11px;}
.okm{background:var(--gd);border:1px solid rgba(61,220,132,.25);color:var(--gr);border-radius:9px;padding:8px 12px;font-size:12px;margin-bottom:11px;}
.wb{background:var(--od);border:1px solid rgba(245,158,66,.25);color:var(--or);border-radius:9px;padding:9px 12px;font-size:11px;margin-top:12px;}
.ld{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text3);font-size:11px;}.ld::before,.ld::after{content:'';flex:1;height:1px;background:var(--border);}
.ar{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;transition:background var(--tr);}
.toast{position:fixed;top:16px;right:16px;background:var(--surface3);border:1px solid var(--border2);border-radius:11px;padding:10px 15px;font-size:12px;font-weight:600;z-index:500;animation:fi .2s ease;max-width:240px;pointer-events:none;backdrop-filter:blur(8px);}
.toast.success{border-color:rgba(61,220,132,.4);color:var(--gr);}.toast.error{border-color:rgba(248,113,113,.4);color:var(--re);}
@keyframes fi{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.sl2{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:9px;}
.es{text-align:center;padding:44px 18px;color:var(--text2);}
.cr2{display:flex;gap:7px;margin-top:9px;}

  meals.filter(function(m){return done.indexOf(m.id)>=0;}).forEach(function(m){m.foods.forEach(function(f){cal+=f.cal;prot+=f.prot;carb+=f.carb;fat+=f.fat;});});

}
